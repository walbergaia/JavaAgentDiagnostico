# Configurações do Agente de Diagnóstico Java

# === CONFIGURAÇÕES PRINCIPAIS ===

# Habilita ou desabilita o agente completamente
enabled=true

# Nome lógico do agente para identificação no backend
agent.name=diagnostic-agent-1

# Nome da aplicação que está sendo monitorada
application.name=MinhaApp.jar

# Intervalo em milissegundos para a coleta de métricas periódicas
sampling.interval.ms=30000

# === CONFIGURAÇÕES DO ENVIO REST ===

# Habilita/desabilita o envio de dados via REST
send.rest.enabled=true

# URL do endpoint da API REST
rest.endpoint.url=http://localhost:8080/api/v1/metrics

# Token de autenticação para a API (opcional)
# auth.token=SEU_TOKEN_AQUI

# Configurações REST avançadas
rest.timeout.ms=5000
rest.retry.max.attempts=3
rest.retry.backoff.initial.ms=1000

# Autenticação personalizada via headers (opcional)
# rest.auth.header.name=Authorization
# rest.auth.header.value=Bearer your-token-here

# === CONFIGURAÇÕES DE ARMAZENAMENTO LOCAL ===

# Habilita armazenamento local como backup/fallback
local.storage.enabled=true

# Diretório para armazenamento local (se vazio, usa temp dir)
local.storage.path=storage

# Número máximo de arquivos no storage local
local.storage.max.files=1000

# Horas para limpeza automática de arquivos antigos
local.storage.cleanup.hours=24

# === CONFIGURAÇÕES DA FILA DE DADOS ===

# Tamanho máximo da fila de dados em memória
data.queue.max.size=10000

# === MÓDULOS DE CAPTURA DE DADOS ===

# Captura de exceções não tratadas
enable.exception.capture=true

# Captura de consultas SQL e performance
enable.sql.capture=true

# Habilita logs detalhados de debug para instrumentação SQL
sql.debug.enabled=true

# Métricas de garbage collection
enable.gc.metrics=true

# Métricas de CPU e memória do sistema
enable.system.cpu.mem=true

# Métricas de I/O (desativado por padrão por ser mais pesado)
enable.io.metrics=true
io.file.enabled=true
io.socket.enabled=true
io.max.top.entries=10

# Tracing distribuído e spans HTTP
tracing.enabled=true
tracing.http.enabled=true
tracing.sample.rate=1.0
tracing.max.spans.per.interval=500
tracing.propagation.w3c=true
tracing.http.capture.request.headers=traceparent,trace-id,span-id
tracing.http.capture.response.headers=content-type

# === ANÁLISE DE THREAD STACK ===

# Habilita análise detalhada de thread stacks
enable.thread.stack.analysis=true

# Profundidade máxima do stack trace
thread.stack.max.depth=20

# Número de amostras de thread para análise
thread.stack.sample.size=10

# === CONFIGURAÇÕES DE THRESHOLDS ===

# Threshold para consideração de SQL lenta (em ms)
sql.slow.threshold.ms=1000

# Habilita normalização e agrupamento de queries SQL
sql.query.normalization.enabled=true

# Habilita coleta de métricas de connection pool via JMX
sql.connection.pool.monitoring.enabled=true

# Intervalo para limpeza de estatísticas antigas (em segundos)
sql.stats.cleanup.interval.seconds=300

# --- SQL AVANÇADO ---
# Limite de agregados de queries enviados por intervalo
sql.aggregation.max.entries=200
# Habilita enviar estatísticas agregadas (média, max, etc.)
sql.aggregation.enabled=true
# Habilita tentativa de explicar SELECTs lentos (cuidado com overhead)
sql.slow.explain.enabled=true
# Timeout em ms para EXPLAIN (se habilitado)
sql.slow.explain.timeout.ms=500

# === CPU SAMPLING PROFILER ===
profiling.cpu.enabled=true
profiling.cpu.interval.ms=200
profiling.cpu.max.frames=32
profiling.cpu.top.n=20
profiling.cpu.include.non.runnable=true

# Análise profunda de stack (desativado por padrão para menor overhead)
enable.deep.stack.analysis=true

# === SERVIDOR DE CONFIGURAÇÃO DINÂMICA ===

# Habilita servidor HTTP para configuração dinâmica
config.server.enabled=true

# Porta do servidor de configuração
config.server.port=8090

# Token de autenticação para o servidor de config (opcional)
config.server.auth.token=

# Endereço de bind do servidor de configuração
config.server.bind.address=localhost