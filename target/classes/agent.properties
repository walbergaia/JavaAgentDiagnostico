# Configurações do Agente de Diagnóstico

# Habilita ou desabilita o agente completamente
enabled=true

# Nome lógico do agente para identificação no backend
agent.name=diagnostic-agent-1

# Nome da aplicação que está sendo monitorada
application.name=MinhaApp.jar

# Intervalo em milissegundos para a coleta de métricas periódicas
sampling.interval.ms=30000

# Configurações do envio de dados para a API REST
send.rest.enabled=true
rest.endpoint.url=http://localhost:8080/api/v1/metrics
# Token de autenticação para a API (opcional)
# auth.token=SEU_TOKEN_AQUI

# Módulos de captura de dados
enable.exception.capture=true
enable.sql.capture=true
enable.gc.metrics=true
enable.system.cpu.mem=true
enable.io.metrics=false # Desativado por padrão por ser mais pesado

# Configurações de detalhamento e thresholds
sql.slow.threshold.ms=1000
enable.deep.stack.analysis=false # Desativado por padrão para menor overhead